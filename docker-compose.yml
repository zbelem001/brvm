version: "3.9"

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      # expect these to be set in a .env file or environment
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - DATABASE_URL=${DATABASE_URL}

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
