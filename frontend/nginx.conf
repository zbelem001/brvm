# Custom nginx configuration for SPA routing
# ensures that any request fallback to index.html so Angular handles
# client-side routes (avoids 404 on reload/paste URL).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # try the exact file, then directory, then fallback to index.html
        try_files $uri $uri/ /index.html;
    }

    # optional: serve 404 also with index so Angular can show its own page
    error_page 404 /index.html;
}
